name: Generate and Upload SBOMs (Local)

on:
  workflow_dispatch:
    inputs:
      component_version:
        description: 'Override component version (defaults to CalVer YYYY.MM.DD.SHA)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  generate-source-sboms:
    name: Generate SBOM (${{ matrix.format }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: cyclonedx
            output_file: lithium.cdx.json
          - format: spdx
            output_file: lithium.spdx.json
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.component_version }}
        run: |
          version=$(./scripts/calver-version.sh)
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Generate and Upload SBOM
        uses: sbomify/sbomify-action@master  # scorecard-ignore:pinned-dependencies -- matches upstream sbomify dogfooding pattern
        env:
          TOKEN: ${{ secrets.SBOMIFY_LOCAL_TOKEN }}
          API_BASE_URL: 'http://127.0.0.1:8000'
          COMPONENT_ID: ${{ vars.SBOMIFY_LOCAL_COMPONENT_ID }}
          COMPONENT_NAME: 'Lithium Python Stack'
          COMPONENT_VERSION: ${{ steps.version.outputs.version }}
          LOCK_FILE: 'uv.lock'
          PRODUCT_RELEASE: ${{ format('["{0}:{1}"]', vars.SBOMIFY_LOCAL_PRODUCT_ID, steps.version.outputs.version) }}
          SBOM_FORMAT: ${{ matrix.format }}
          AUGMENT: true
          ENRICH: true
          UPLOAD: true
          OUTPUT_FILE: ${{ matrix.output_file }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-local-${{ matrix.format }}
          path: ${{ matrix.output_file }}
          retention-days: 7
